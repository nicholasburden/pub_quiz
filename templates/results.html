{% extends "base.html" %}
{% block title %}Results - {{ game_name }}{% endblock %}
{% block content %}
<header>
    <h1>{{ game_name }}</h1>
    <p class="subtitle">Final Results</p>
</header>

<section id="podium-section" class="card">
    <div id="podium" class="podium"></div>
</section>

<section id="leaderboard-section" class="card">
    <h2>Full Leaderboard</h2>
    <ol id="full-leaderboard" class="leaderboard"></ol>
</section>

<div class="actions">
    <button id="play-again-btn" class="btn btn-primary" style="display: none;">Play Again</button>
    <a href="/" class="btn btn-secondary">Home</a>
</div>
{% endblock %}

{% block scripts %}
<script>
    window.GAME_ID = "{{ game_id }}";
    window.GAME_NAME = "{{ game_name }}";
</script>
<script src="/static/js/results.js"></script>
{% endblock %}
